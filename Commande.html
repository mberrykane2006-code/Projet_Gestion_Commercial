<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande</title>
    <style>
        body{
    font-family: 'Arial', sans-serif;
    background-color: #FFFDD0;
    display: flex;
    align-items: center;
    height:110vh;
    justify-content: center;
}

form{
    display: flex;
    flex-direction: column;
    padding: 10px;
    border-radius: 10px;
    background-color:#D2691E;
    width: 30vw;
}

h1{
    text-align: center;
}

.ko{
    background-color: black;
    color: white;
}

label{
    margin-bottom: 10px;
}

input{
    margin-bottom: 10px;
    padding: 5px;
    width: 29vw;
    border-radius: 7px;
    margin-left: 0cm;
}

select{
    padding: 5px;
    width: 29vw;
    border-radius: 7px;
    margin-left: 0cm;
}

footer{
    padding: 0;
    margin: 0;
    background-color: aquamarine;
}

</style>
</head>
<body>
    <form action="">
    <h1>Ma Commande</h1>
    <hr color="black" width="100%">
<div class="ok">
<div>
<label for="">ID :</label>
<input type="text" placeholder="" required > <br>
</div>
<div>
    <label for="">Date de commande :</label>
    <input type="date" placeholder="" required > <br>
</div>
<div>
    <label for="">Montant :</label> 
    <input type="number" placeholder="" required> 
</div>
<div>
   <label>Statut</label> 
    <select name="profile" required>
        <option value="">-- Choisir --</option>
        <option value="etudiant">En cours</option>
        <option value="administrateur">Annulée</option>
        <option value="secretaire">Déjà livrée</option>
    </select>
</div>
</div> <br>
<input type="submit" value="ENTRER" class="ko">
</form> <br>
</div>  

</body>
</html>
